<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - RepinCar</title>
  <!-- Bootstrap para estilos base -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu hoja de estilos personalizada -->
  <link rel="stylesheet" href="tienda.css">
</head>
<body>

      <a href="Repincar.html"> <img src="imagenes/banner.jpg" title=" inicio "
    style="width: 120px; height: auto;"></a>

  <!-- Encabezado futurista -->
  <header class="tienda-header d-flex align-items-center">
    <div class="container-fluid">
      <div class="row align-items-center">

        <!-- Mitad izquierda: texto -->
        <div class="col-md-6 text-start ps-5 header-text">
          <h1 class="display-3 fw-bold">Tienda</h1>
          <p class="lead">Conoce nuestros kit de limpieza y restauracion para darle a tu auto
                un estilo unico.</p>
          <a href="quienes.html" class="btn btn-custom mt-3" onclick="mostrarProductos()">Ver Productos</a>
        </div>

        <!-- Mitad derecha: imagen -->
        <div class="col-md-6 text-center header-image">
          <img src="imagenes/productos.jpg" alt="Imagen Tienda" class="img-fluid futuristic-img">
        </div>
      </div>
    </div>


    <!-- Animación de fondo -->
    <ul class="circulos">
      <li></li><li></li><li></li><li></li><li></li>
      <li></li><li></li><li></li><li></li><li></li>
    </ul>
  </header>

  <!-- Sección de productos -->
  <main class="container my-5" id="productos">
    <h2 class="text-primary mb-4">Nuestros Productos</h2>
    <div id="lista-productos" class="row g-4"></div>
  </main>

  <!-- Carrito -->
  <section class="container my-5">
    <h2 class="text-primary mb-4">Carrito</h2>
    <div id="carrito" class="futuristic-card p-3"></div>
    <p id="total" class="fw-bold mt-3"></p>
  </section>

  <footer class="text-center py-4 text-secondary">
    <p>© 2026 RepinCar - Tienda Automotriz Futurista</p>
  </footer>

  <!-- Tu archivo JS -->
  <script src="tienda.js"></script>
</body>
</html>
