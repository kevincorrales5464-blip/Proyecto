<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - RepinCar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="tienda.css">
</head>

<body>

  <!-- Logo / Inicio -->
  <a href="index.html">
    <img src="imagenes/banner.jpg" title="inicio" style="width: 120px; height: auto;">
  </a>

  <!-- Encabezado futurista -->
  <header class="tienda-header d-flex align-items-center">
    <div class="container-fluid">
      <div class="row align-items-center">

        <!-- Texto -->
        <div class="col-md-6 text-start ps-5 header-text">
          <h1 class="display-3 fw-bold">Tienda</h1>
          <p class="lead">
            Conoce nuestros kits de limpieza y restauración para darle a tu auto un estilo único.
          </p>

          <!-- BOTÓN CORREGIDO -->
          <button class="btn btn-custom mt-3" onclick="mostrarProductos()">
            Ver Productos
          </button>
        </div>

        <!-- Imagen -->
        <div class="col-md-6 text-center header-image">
          <img src="imagenes/productos.jpg" alt="Imagen Tienda" class="img-fluid futuristic-img">
        </div>

      </div>
    </div>

    <!-- Animación fondo -->
    <ul class="circulos">
      <li></li><li></li><li></li><li></li><li></li>
      <li></li><li></li><li></li><li></li><li></li>
    </ul>
  </header>

  <!-- PRODUCTOS -->
  <div id="lista de productos" class="row"> </div>
  <h2>Carrito</h2>
  <div id="carrito">  </div>
  <p id="total"> </p>

  <!-- CARRITO -->
  <section class="container my-5">
    <h2 class="text-primary mb-4">Carrito</h2>

    <div id="carrito" class="futuristic-card p-3"></div>

    <p id="total" class="fw-bold mt-3"></p>
  </section>

  <!-- FOOTER -->
  <footer class="text-center py-4 text-secondary">
    <p>© 2026 RepinCar - Tienda Automotriz</p>
  </footer>

  <!-- JS -->
  <script src="tienda.js"></script>
  <script>
    mostrarProductos();
  </script>
</body>
    
  </script>

  <!-- Bootstrap JS (opcional pero recomendado) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
