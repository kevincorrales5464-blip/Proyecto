<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="formulario.css">
</head>
<body>

  <a href="index.html">
    <img src="imagenes/banner.jpg" title="Inicio" style="width: 120px; height: auto;">
  </a>

  <header class="tienda-header d-flex align-items-center">
    <div class="container-fluid">
      <div class="row align-items-center">
        <div class="col-md-8 mx-auto">
          <form id="contacto-form" class="formulario">
            <h2 class="form-title">Cuéntanos tu problema</h2>
            
            <!-- Nombre: solo letras y espacios -->
            <input type="text" id="nombre" name="nombre" 
                   placeholder="Tu nombre" 
                   required 
                   pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{2,50}" 
                   title="Solo letras y espacios, mínimo 2 caracteres">

            <!-- Teléfono: exactamente 10 dígitos -->
            <input type="tel" id="telefono" name="telefono" 
                   placeholder="Número de celular" 
                   required 
                   pattern="[0-9]{10}" 
                   title="Debe contener exactamente 10 dígitos">

            <!-- Problema: mínimo 10 caracteres -->
            <textarea id="problema" name="problema" 
                      placeholder="Describe el daño aquí..." 
                      required 
                      minlength="10" 
                      maxlength="300"
                      title="Debe tener entre 10 y 300 caracteres"></textarea>
            
            <button type="submit" class="btn-enviar">Enviar</button>
          </form>

          <!-- Mensaje emergente -->
          <div id="mensaje-exito" class="mensaje-exito" style="display:none;">
            ¡Muy bien, prontamente nos pondremos en contacto contigo!
          </div>
        </div>
      </div>
    </div>
  </header>

  <a href="https://wa.me/573506227558?text=Hola%20quiero%20más%20información%20sobre%20RepinCar" 
     class="whatsapp-float" 
     target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" 
         alt="WhatsApp" 
         class="whatsapp-icon">
    <span class="tooltip">Escríbenos por WhatsApp</span>
  </a>
