<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</del></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="formulario.css">
</head>
<body>

    <a href="../index.html"> <img src="../imagenes/banner.jpg" title=" inicio "
    style="width: 120px; height: auto;"></a>
    

<header class="tienda-header d-flex align-items-center">
  <div class="container-fluid">
    <div class="row align-items-center">
      <div class="col-md-8 mx-auto">
        <form id="contacto-form" class="formulario">
          <h2 class="form-title">Cuéntanos tu problema</h2>
          
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required="letter">
          <input type="number" id="telefono" name="telefono" placeholder="numero de celular" required="number">
          <textarea id="problema" name="problema" placeholder="Describe el daño aquí..." required="letter"></textarea>
          
          <button type="submit" class="btn-enviar">Enviar</button>
        </form>

        <!-- Mensaje emergente -->
        <div id="mensaje-exito" class="mensaje-exito">
          ¡Muy bien, prontamente nos pondremos en contacto contigo!
        </div>
      </div>
    </div>
  </div>
</header>

                alt="WhatsApp"

</body>
</html>
